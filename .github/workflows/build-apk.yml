name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build React App and Capacitor
        run: |
          # 核心修复：加入 --yes 强制静默安装，防止由于系统询问而卡死
          npx --yes create-vite@latest app --template react-ts
          cd app
          npm install
          npm install -D typescript
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android
          
          npx cap init "TongjianApp" "com.tongjian.app" --web-dir dist
          npx cap add android
          
          # 覆盖为你写的代码
          if [ -d ../frontend/src ]; then cp -r ../frontend/src/* src/; fi
          
          npx vite build
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tongjian-zhiku-app
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
