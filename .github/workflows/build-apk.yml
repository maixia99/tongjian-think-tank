name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 这里升级到了 v4

      - name: Setup Node.js
        uses: actions/setup-node@v4  # 这里升级到了 v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4  # 这里升级到了 v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build React App and Capacitor
        run: |
          npm create vite@latest app -- --template react-ts
          cd app
          npm install
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android
          npx cap init "TongjianApp" "com.tongjian.app" --web-dir dist
          npx cap add android
          # 如果之前传了前端代码就复制进去，没有就用默认的
          if [ -d ../frontend/src ]; then cp -r ../frontend/src/* src/; fi
          npm run build
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4  # 最关键的修复！升级到了 v4
        with:
          name: tongjian-zhiku-app
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
