name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 获取你的代码
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. 安装 Node.js (前端环境)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 安装 Java (安卓打包环境)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. 全自动构建 React 框架并植入你的代码
      - name: Build React App & Capacitor
        run: |
          # 在云端自动生成 React 基础框架
          npm create vite@latest app -- --template react-ts
          cd app
          npm install
          
          # 安装打包工具 Capacitor
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android
          npx cap init "通鉴智库" "com.tongjian.app" --web-dir dist
          npx cap add android
          
          # 把你写的 App.tsx 植入进去
          if [ -f ../frontend/src/App.tsx ]; then
            cp ../frontend/src/App.tsx src/App.tsx
          fi
          
          # 编译前端代码并同步给安卓
          npm run build
          npx cap sync android

      # 5. 生成最终的 APK 文件
      - name: Build APK with Gradle
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 6. 把 APK 放到下载区
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: tongjian-zhiku-app
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
