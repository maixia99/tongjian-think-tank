name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build React App and Capacitor
        run: |
          npx --yes create-vite@latest app --template react-ts
          cd app
          npm install
          npm install -D typescript
          npm install @capacitor/core@5
          npm install -D @capacitor/cli@5 @capacitor/android@5
          
          # 【真正修复的地方】：精确指向 tongjian-app 文件夹去调用你的代码！
          cp -r ../tongjian-app/frontend/src/* src/
          
          npx cap init "TongjianApp" "com.tongjian.app" --web-dir dist
          npx cap add android
          npx vite build
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tongjian-zhiku-app
          path: '**/*.apk'
